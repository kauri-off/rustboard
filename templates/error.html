<!DOCTYPE html>
<html lang="{{ t.lang_code }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error {{ status }} - {{ site_name }}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ css_hash }}">
</head>
<body>
<nav>
  <a href="/boards" class="site-title">{{ site_name }}</a>
</nav>
<div class="page">
  <div class="error-page">
    <h1>{{ status }}</h1>
    <p>{{ message }}</p>
    <p><a href="/boards">{{ t.back_to_boards }}</a></p>
  </div>
</div>
<footer>
  <p>{{ site_name }}</p>
</footer>
</body>
</html>
