<!DOCTYPE html>
<html lang="{{ t.lang_code }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site_name }}{% endblock %}">
  <meta property="og:site_name" content="{{ site_name }}">
  <meta property="og:title" content="{% block og_title %}{{ site_name }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ site_name }}{% endblock %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  {% block og_url %}{% if !site_url.is_empty() %}<meta property="og:url" content="{{ site_url }}">{% endif %}{% endblock %}
  {% block og_image %}{% endblock %}
  <link rel="stylesheet" href="/static/style.css?v={{ css_hash }}">
</head>
<body>
<nav>
  <a href="/boards" class="site-title">{{ site_name }}</a>
  <span class="board-links">
    [
    {% for board in boards %}
    <a href="/{{ board.slug }}/" class="board-link">/{{ board.slug }}/</a>{% if !loop.last %} {% endif %}
    {% endfor %}
    ]
  </span>
  <form method="post" action="/set-lang" class="lang-switcher">
    <button type="submit" name="lang" value="en">[en]</button>
    <button type="submit" name="lang" value="ru">[ru]</button>
  </form>
</nav>

<div class="page">
{% block content %}{% endblock %}
</div>

<footer>
  <a href="https://github.com/kauri-off/rustboard">Rustboard</a>
  <p>{{ t.powered_by }} <strong>Rust</strong></p>
</footer>
</body>
</html>
