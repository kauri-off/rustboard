<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site_name }}{% endblock %}">
  <meta property="og:site_name" content="{{ site_name }}">
  <meta property="og:title" content="{% block og_title %}{{ site_name }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ site_name }}{% endblock %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  {% block og_url %}{% if !site_url.is_empty() %}<meta property="og:url" content="{{ site_url }}">{% endif %}{% endblock %}
  {% block og_image %}{% endblock %}
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <a href="/boards" class="site-title">{{ site_name }}</a>
  <span class="board-links">
    [
    {% for board in boards %}
    <a href="/{{ board.slug }}/">/{{ board.slug }}/</a>{% if !loop.last %} {% endif %}
    {% endfor %}
    ]
  </span>
</nav>

<div class="page">
{% block content %}{% endblock %}
</div>

<footer>
  <p>{{ site_name }}</p>
</footer>
</body>
</html>
